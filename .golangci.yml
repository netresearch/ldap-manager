# golangci-lint v2 configuration for LDAP Manager.
# Extended linter set re-enabled after cleanup in #547.

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

output:
  formats:
    text:
      path: stdout

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - copyloopvar
    - noctx
    - errcheck
    - dupl
    - gocritic
    - gocognit
    - gosec
    - lll
    - nakedret
    - revive
    - nlreturn
    - makezero
    - wastedassign

  settings:
    staticcheck:
      checks: ["all", "-ST1000", "-ST1003", "-ST1020", "-ST1021", "-ST1022"]
    gocognit:
      min-complexity: 30
    lll:
      line-length: 140
    nakedret:
      max-func-lines: 30
    revive:
      severity: warning
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: var-naming
          disabled: true
        - name: unused-parameter
          disabled: true

  exclusions:
    paths:
      - ".*_templ\\.go$"
      - bin
      - node_modules
    rules:
      - path: ".*_templ\\.go$"
        linters: [typecheck]
      - path: _test\.go
        linters:
          - gocognit
          - gosec
          - errcheck
          - noctx
          - dupl
          - lll
          - gocritic
          - revive
          - nlreturn

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/netresearch/ldap-manager

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

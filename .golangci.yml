# golangci-lint v2 configuration for LDAP Manager.
# Migrated from v1-style schema (incompatible with golangci-lint v2)
# during Go workflow standardization (netresearch/.github#47).

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

output:
  formats:
    text:
      path: stdout

linters:
  default: none
  enable:
    # Go's built-in static checks
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Additional quality gates that were enabled under the v1 config
    - asciicheck
    - bodyclose
    - copyloopvar
    - dupl
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - fatcontext
    - forcetypeassert
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gosec
    - lll
    - makezero
    - misspell
    - nakedret
    - nilerr
    - nlreturn
    - noctx
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - sqlclosecheck
    - tparallel
    - unconvert
    - unparam
    - wastedassign
    - whitespace

  # Intentionally not enabled (were disabled under v1):
  #   - funlen  (parsing/warmup logic is legitimately long)
  #   - cyclop  (health-check branching is legitimately branchy)

  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - (*github.com/gofiber/fiber/v2.Ctx).JSON
        - (*github.com/gofiber/fiber/v2.Ctx).SendString
        - (*github.com/gofiber/fiber/v2.Ctx).Redirect
    gocognit:
      min-complexity: 20
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - whyNoLint
        - hugeParam
    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G107 # URL provided to HTTP request as taint input — acceptable for health checks
    lll:
      line-length: 120
    misspell:
      locale: US
    nakedret:
      max-func-lines: 30

  exclusions:
    paths:
      - ".*_templ\\.go$"
      - bin
      - node_modules
    rules:
      # Generated templ files
      - path: ".*_templ\\.go$"
        linters: [typecheck]
      # go:generate directives can legitimately exceed the line limit
      - source: "^//go:generate"
        linters: [lll]
      # Tests get complexity leeway
      - path: _test\.go
        linters: [gocognit, gosec]
      # main.go entry point
      - path: main\.go
        linters: [gocognit]

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/netresearch/ldap-manager

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

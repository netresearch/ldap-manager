codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        informational: true
      core:
        paths:
          - internal/ldap_cache/
          - internal/options/
          - internal/retry/
          - internal/version/
        target: 90%
        informational: true
      web:
        paths:
          - internal/web/
        target: 70%
        informational: true
    patch:
      default:
        # Informational while the Phase 1 / 2 / 3 UI revamp lands:
        # this PR adds ~5k lines of handler + template code whose
        # fuller coverage lives in the integration + e2e suites
        # (ldap_integration_test.go against a real LDAP service
        # container; internal/e2e Playwright + OpenLDAP
        # testcontainer), NOT in the unit numerator. Keeping the
        # check reporting (so reviewers see the number on every
        # PR) but not blocking merge. Flip back to
        # `target: auto` + remove `informational` once handler
        # unit coverage is back up to the project baseline.
        target: auto
        informational: true

ignore:
  - "cmd/"
  - "internal/ldap/"
  - "internal/integration/"
  - "internal/web/static/"
  - "**/*_templ.go"
  - "**/doc.go"

component_management:
  individual_components:
    - component_id: core
      name: Core Libraries
      paths:
        - internal/ldap_cache/
        - internal/options/
        - internal/retry/
        - internal/version/
    - component_id: web
      name: Web Application
      paths:
        - internal/web/
    - component_id: templates
      name: Templates (Generated)
      paths:
        - internal/web/templates/

flags:
  unittests:
    paths:
      - internal/
    carryforward: true
  integration:
    paths:
      - internal/integration/
    carryforward: true

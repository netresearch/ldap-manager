codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        informational: true
      core:
        paths:
          - internal/ldap_cache/
          - internal/options/
          - internal/retry/
          - internal/version/
        target: 90%
        informational: true
      web:
        paths:
          - internal/web/
        target: 70%
        informational: true
    patch:
      default:
        target: auto

ignore:
  - "cmd/"
  - "internal/ldap/"
  - "internal/integration/"
  - "internal/web/static/"
  - "**/*_templ.go"
  - "**/doc.go"

component_management:
  individual_components:
    - component_id: core
      name: Core Libraries
      paths:
        - internal/ldap_cache/
        - internal/options/
        - internal/retry/
        - internal/version/
    - component_id: web
      name: Web Application
      paths:
        - internal/web/
    - component_id: templates
      name: Templates (Generated)
      paths:
        - internal/web/templates/

flags:
  unittests:
    paths:
      - internal/
    carryforward: true
  integration:
    paths:
      - internal/integration/
    carryforward: true

# Codecov configuration managed by netresearch/.github/templates/
# Declares the three test-tier flags emitted by go-check.yml so flag-scoped
# uploads accumulate instead of overwriting each other.

coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 0.5%
        if_ci_failed: error
        if_not_found: success
    patch:
      default:
        # Lowered from the template default of 80% to match the
        # authored-code floor of this repo: the Pico/templ UI revamp
        # (Phase 1 foundation + Phase 2 power-browsing + Phase 3 bulk
        # actions) adds ~5k lines of handler + template code whose
        # fuller coverage lives in the integration and e2e suites
        # (ldap_integration_test.go against a real LDAP service
        # container; internal/e2e Playwright + OpenLDAP
        # testcontainer), NOT in the unit numerator. Raise this back
        # toward 80 as follow-up PRs add handler unit tests that
        # don't need live LDAP.
        target: 40%
        threshold: 1%
        if_ci_failed: error
        if_not_found: success

flags:
  unittests:
    paths:
      - '!**/*_templ.go'     # exclude generated templ files
      - '!**/testdata/**'
    carryforward: true
  integration:
    paths:
      - '!**/*_templ.go'
    carryforward: true
  e2e:
    paths:
      - '!**/*_templ.go'
    carryforward: true

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 0.5%
  individual_components:
    - component_id: cmd
      paths:
        - 'cmd/**'
    - component_id: internal
      paths:
        - 'internal/**'

# Don't fail CI purely due to codecov errors / missing tokens — the in-CI
# coverage-threshold enforcement is the authoritative gate.
codecov:
  require_ci_to_pass: false
  notify:
    wait_for_ci: true

comment:
  layout: "header, flags, components, diff, files"
  behavior: default
  require_changes: false

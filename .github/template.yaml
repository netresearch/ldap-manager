# Managed by netresearch/.github/templates/
# Drift from the template is blocking CI in this repo (check-template-drift.yml).
# Record explicit exceptions under intentional-drift[] to unblock.
template: go-app
intentional-drift:
- path: .github/workflows/ci.yml
  reason: Templ code must be generated before go test; pre-build-cmd installs the
    templ CLI and runs `templ generate`. Opts into the reusable workflow's e2e
    tier (enable-e2e-tests=true, e2e-test-packages=./internal/e2e/...) so the
    browser-level journeys under internal/e2e/ — bootstrapped via a
    testcontainers OpenLDAP + Playwright-driven headless Chromium against an
    in-process ldap-manager listener — run on every PR with coverage uploaded
    under the "e2e" Codecov flag. Sets coverage-threshold=60 because this PR
    adds a substantial Pico/templ UI layer whose handlers need live LDAP to
    exercise fully; that surface is covered by the integration + e2e suites,
    not the unit numerator. 60% is the current authored-code floor and is
    expected to rise as follow-up PRs add handler unit tests.
- path: .github/labeler.yml
  reason: "Branch drops TypeScript/Tailwind/PostCSS/bun toolchain (see
    `chore: drop Tailwind/TypeScript/PostCSS; Go-only build`). The go-app
    template's labeler still references *.ts / *.tsx / package.json / bun.lock /
    tsconfig*.json for the `dependencies`, `tests` and `frontend` label rules,
    plus *.scss, *.html, *.jsx. Our labeler omits those because the paths no
    longer exist in this repo; re-adding them would produce ghost labels on
    any unrelated PR. Also adds scripts/vendor.lock to dependencies so vendor
    refreshes (Pico, htmx, Alpine CSP build pinned via scripts/vendor.sh)
    route to the dependencies label."
- path: .github/workflows/container.yml
  reason: "Rolling `:main` container image. The templates/go-app pipeline
    ships only tag-driven releases, but this repo historically shipped a
    per-main-push container at ghcr.io/netresearch/ldap-manager:main (see
    the original container.yml deleted in commit ea6f7a3). That deletion
    dropped the rolling build without a replacement. This workflow
    restores it under the new binary-selector Dockerfile model: one job
    cross-compiles all five linux/{386,amd64,arm64,armv6,armv7} binaries
    in a pre-build-command (matching release.yml's ldflags + `templ
    generate`), then the reusable build-container.yml runs the Dockerfile
    whose binary-selector stage picks the correct bin/<name>-linux-* per
    TARGETARCH/TARGETVARIANT — no `go build` inside Docker, same
    single-compile invariant release.yml upholds."
- path: .github/workflows/release.yml
  reason: "Templ code must be generated before `go build`. The
    `internal/web/templates/*_templ.go` files are gitignored, so a clean
    release checkout has none of them and compilation fails with
    `undefined: PinnedEntry` etc. The go-app template's
    `pre-build-command` only runs `bun run build:assets` when
    package.json is present; this repo is Go-only (no package.json —
    see the labeler drift entry above). Adds
    `go install github.com/a-h/templ/cmd/templ@latest && templ generate`
    to the pre-build-command so release binaries compile, mirroring
    ci.yml's existing `pre-build-cmd`."
- path: .github/workflows/codeql.yml
  reason: "Same templ-extraction problem as the other workflows.
    Without `templ generate`, CodeQL's Go autobuilder fails to extract
    `internal/web` and `internal/web/templates` (gitignored
    *_templ.go), and the standalone `CodeQL` aggregator returns
    NEUTRAL — which the `code_scanning` ruleset treats as
    \"still expecting result\" and blocks merges on every PR,
    including ones that don't touch any Go (see #597). Passes
    `pre-build-cmd-go` (introduced in netresearch/.github#119) to
    install the templ CLI at the go.mod-pinned version and run
    `templ generate` between CodeQL init and the analyze/extract
    pass. Other go-app consumers without templ-style codegen don't
    need this, hence intentional-drift rather than a template
    change."
- path: .github/dependabot.yml
  reason: "Opt-in devcontainers ecosystem. The trimmed go-app template (netresearch/.github#166) declares only gomod/github-actions/docker; this repo has a .devcontainer so it self-manages dependabot.yml to keep devcontainers updates. Core blocks are kept in step with the template manually."

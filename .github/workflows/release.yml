name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build (e.g. v1.2.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  create-release:
    name: Create GitHub Release
    uses: netresearch/.github/.github/workflows/create-release.yml@4f6d149347c61a27ce243f5ac8011d6748487341 # main
    permissions:
      contents: write
    with:
      tag: ${{ inputs.tag || '' }}

  binaries:
    name: Build binaries
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: linux, goarch: arm, goarm: "7" }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    uses: netresearch/.github/.github/workflows/build-go-attest.yml@4f6d149347c61a27ce243f5ac8011d6748487341 # main
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      binary-name: ldap-manager-${{ matrix.goos }}-${{ matrix.goarch }}
      goos: ${{ matrix.goos }}
      goarch: ${{ matrix.goarch }}
      goarm: ${{ matrix.goarm || '' }}
      main-package: ./cmd/ldap-manager
      ldflags: "-s -w -X github.com/netresearch/ldap-manager/internal/version.Version=${{ needs.create-release.outputs.version }} -X github.com/netresearch/ldap-manager/internal/version.CommitHash=${{ needs.create-release.outputs.sha }}"
      ref: ${{ needs.create-release.outputs.tag }}
      release-tag: ${{ needs.create-release.outputs.tag }}
      sbom: true
      setup-bun: true
      pre-build-command: "bun install --frozen-lockfile && bun run build:assets"

  container:
    name: Build container image
    needs: create-release
    uses: netresearch/.github/.github/workflows/build-container.yml@4f6d149347c61a27ce243f5ac8011d6748487341 # main
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    with:
      image-name: ldap-manager
      ref: ${{ needs.create-release.outputs.tag }}
      sign: true
      attest: true

  finalize:
    name: Finalize release
    needs: [create-release, binaries, container]
    uses: netresearch/.github/.github/workflows/finalize-release.yml@4f6d149347c61a27ce243f5ac8011d6748487341 # main
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      tag: ${{ needs.create-release.outputs.tag }}
      image-ref: ghcr.io/${{ github.repository_owner }}/ldap-manager

# Auto-merge dependency updates — delegates to the canonical reusable at
# netresearch/.github. The reusable handles Harden Runner, auto-approve and
# merge-strategy detection.
name: Auto-merge dependency PRs

on:
  pull_request:

permissions:
  contents: read

jobs:
  auto-merge:
    uses: netresearch/.github/.github/workflows/auto-merge-deps.yml@4f6d149347c61a27ce243f5ac8011d6748487341 # main
    permissions:
      contents: write
      pull-requests: write

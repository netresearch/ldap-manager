# CodeQL — delegates to the canonical reusable at netresearch/.github.
# This repo ships a Go backend and a TypeScript frontend, so both are
# analysed. The `actions` language is covered separately at the org
# level; adding it here would duplicate that coverage.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly deep scan on Sundays at 03:00 UTC (after the quality sweep).
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze-go:
    name: Analyze Go
    uses: netresearch/.github/.github/workflows/codeql.yml@main
    permissions:
      contents: read
      security-events: write
      actions: read
    with:
      languages: go

  analyze-ts:
    name: Analyze TypeScript
    uses: netresearch/.github/.github/workflows/codeql.yml@main
    permissions:
      contents: read
      security-events: write
      actions: read
    with:
      languages: javascript-typescript
